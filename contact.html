<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Contact — tarik yigit</title>
<link rel="stylesheet" href="style.css"/>
</head>
<body class="page-contact">

<div class="page-transition-overlay"></div>

<header id="site-header">
  <div class="hd-left">
    <a href="index.html" class="hd-name">tarik yigit</a>
  </div>
  <nav class="hd-nav">
    <a href="artworks.html" data-en="Artworks" data-tr="Eserler">Artworks</a>
    <a href="writings.html" data-en="Writings"  data-tr="Yazılar">Writings</a>
    <a href="about.html"    data-en="About"     data-tr="Hakkında">About</a>
    <a href="contact.html"  class="active" data-en="Contact" data-tr="İletişim">Contact</a>
  </nav>
  <div class="hd-right">
    <a id="ig-link" href="#" target="_blank" rel="noopener" class="hd-ig" title="Instagram">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="2" width="20" height="20" rx="5"/>
        <circle cx="12" cy="12" r="4"/>
        <circle cx="17.5" cy="6.5" r="0.8" fill="currentColor" stroke="none"/>
      </svg>
    </a>
    <div class="hd-lang">
      <button class="lb on" onclick="setLang('en')" id="b-en">EN</button>
      <span class="ls">·</span>
      <button class="lb" onclick="setLang('tr')" id="b-tr">TR</button>
    </div>
  </div>
</header>

<main class="contact-main">
  <div class="contact-inner">
    <h1 class="contact-heading" data-en="Contact" data-tr="İletişim">Contact</h1>
    <a class="contact-email" id="contactEmail" href="#">—</a>
    <p class="contact-note" id="contactNote"></p>
    <div class="contact-ig">
      <a id="contactIg" href="#" target="_blank" rel="noopener">Instagram</a>
    </div>
  </div>
</main>

<footer class="site-footer">
  <span id="footer-name"></span>
  <span id="footer-domain"></span>
</footer>

<script src="content.js"></script>
<script src="engine.js"></script>
<script>
  initSite();
  document.getElementById('contactEmail').textContent = SITE.email;
  document.getElementById('contactEmail').href = 'mailto:' + SITE.email;
  document.getElementById('contactNote').textContent =
    currentLang === 'tr' ? SITE.contact.note.tr : SITE.contact.note.en;
  document.getElementById('contactIg').href = SITE.instagram;
  animateIn();
</script>
</body>
</html>
