<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>tarık yiğitt</title>
<link rel="stylesheet" href="style.css"/>
</head>
<body class="page-home">

<div class="page-transition-overlay"></div>

<!-- HEADER -->
<header id="site-header">
  <div class="hd-left">
    <a href="index.html" class="hd-name" data-en data-tr>tarık yiğit</a>
  </div>
  <nav class="hd-nav">
    <a href="artworks.html" data-en="Artworks" data-tr="Eserler">Artworks</a>
    <a href="writings.html" data-en="Writings"  data-tr="Yazılar">Writings</a>
    <a href="about.html"    data-en="About"     data-tr="Hakkında">About</a>
    <a href="contact.html"  data-en="Contact"   data-tr="İletişim">Contact</a>
  </nav>
  <div class="hd-right">
    <a id="ig-link" href="#" target="_blank" rel="noopener" class="hd-ig" title="Instagram">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="2" width="20" height="20" rx="5"/>
        <circle cx="12" cy="12" r="4"/>
        <circle cx="17.5" cy="6.5" r="0.8" fill="currentColor" stroke="none"/>
      </svg>
    </a>
    <div class="hd-lang">
      <button class="lb on" onclick="setLang('en')" id="b-en">EN</button>
      <span class="ls">·</span>
      <button class="lb" onclick="setLang('tr')" id="b-tr">TR</button>
    </div>
  </div>
</header>

<!-- HERO -->
<section class="hero" id="hero">
  <div class="hero-track" id="heroTrack"></div>
  <div class="hero-vignette"></div>
  <div class="hero-wordmark">
    <span id="hero-name"></span>
  </div>
  <div class="hero-nav">
    <button class="hero-arrow" onclick="heroMove(-1)">←</button>
    <div class="hero-dots" id="heroDots"></div>
    <button class="hero-arrow" onclick="heroMove(1)">→</button>
  </div>
</section>

<!-- RECENT WORKS STRIP -->
<section class="home-strip">
  <div class="strip-header">
    <span class="strip-label" data-en="Recent works" data-tr="Son eserler">Recent works</span>
    <a href="artworks.html" class="strip-link" data-en="View archive →" data-tr="Arşive git →">View archive →</a>
  </div>
  <div class="strip-grid" id="recentGrid"></div>
</section>

<!-- PROJECTS -->
<section class="home-projects" id="projectsSec">
  <div class="hp-label" data-en="Ongoing &amp; Planned" data-tr="Devam &amp; Planlandı">Ongoing &amp; Planned</div>
  <div id="projectsList"></div>
</section>

<!-- FOOTER -->
<footer class="site-footer">
  <span id="footer-name"></span>
  <span id="footer-domain"></span>
</footer>

<script src="content.js"></script>
<script src="engine.js"></script>
<script>
  initSite();
  renderHero();
  renderRecentGrid();
  renderProjects();
  animateIn();
</script>
</body>
</html>
