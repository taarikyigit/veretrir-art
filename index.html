<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>tarik yigit</title>
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }

:root {
  --bg: #f5f2ed;
  --bg2: #eeebe5;
  --ink: #111;
  --mid: #888;
  --faint: #ccc;
  --font: 'Courier New', Courier, monospace;
  --hh: 52px;
}

body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font);
  font-size: 14px;
  line-height: 1.7;
  overflow-x: hidden;
}

/* ══════════════════════════════
   HEADER
══════════════════════════════ */
header {
  position: fixed; top:0; left:0; right:0;
  z-index: 200;
  background: var(--bg);
  border-bottom: 1px solid #ddd;
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  padding: 0 24px;
  height: var(--hh);
}

.header-left { display:flex; align-items:center; gap:12px; }

.header-name {
  font-size: 13px; font-weight: bold;
  letter-spacing: 0.04em; text-decoration: none; color: var(--ink);
}

.ig-btn {
  display: flex; align-items: center;
  text-decoration: none; color: var(--mid);
  transition: color 0.2s; padding: 4px;
  border-radius: 2px;
}
.ig-btn:hover { color: var(--ink); }
.ig-btn svg { width: 16px; height: 16px; display:block; }

nav { display:flex; gap:28px; }
nav a {
  font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--mid); text-decoration: none; transition: color 0.2s;
}
nav a:hover { color: var(--ink); }

.header-right { display:flex; justify-content:flex-end; align-items:center; gap:3px; }
.lb {
  background:none; border:none; font-family:var(--font);
  font-size:11px; letter-spacing:0.1em; color:#aaa; cursor:pointer; padding:2px 4px;
  transition:color 0.2s;
}
.lb.on { color:var(--ink); border-bottom:1px solid var(--ink); }
.lb:hover { color:var(--ink); }
.ls { color:var(--faint); font-size:9px; }

/* ══════════════════════════════
   HERO
══════════════════════════════ */
#hero {
  position:relative; height:100vh;
  overflow:hidden; display:flex;
  align-items:center; justify-content:center;
}

.hero-slides {
  position:absolute; inset:0; display:flex;
  transition: transform 0.9s cubic-bezier(0.77,0,0.175,1);
}
.hero-slide { flex:0 0 100%; height:100%; background:#1a1a1a; }
.hero-slide img { width:100%; height:100%; object-fit:cover; display:block; opacity:0.7; }
.hero-slide-ph {
  width:100%; height:100%;
  background:linear-gradient(135deg,#1c1c1c,#2a2828,#1a1818);
  display:flex; align-items:center; justify-content:center;
}
.hero-slide-ph span { font-size:10px; letter-spacing:0.3em; text-transform:uppercase; color:#444; }

.hero-overlay { position:absolute; inset:0; background:rgba(0,0,0,0.38); z-index:1; }

.hero-name-wrap {
  position:relative; z-index:2;
  background:#000; padding:9px 24px;
}
.hero-name {
  font-size: clamp(16px,2.6vw,26px);
  font-weight: bold;
  letter-spacing: 0.14em;
  color: #fff;
  line-height: 1;
  text-transform: none;
}

.hero-dots {
  position:absolute; bottom:24px; left:50%; transform:translateX(-50%);
  z-index:2; display:flex; gap:8px;
}
.hero-dot {
  width:5px; height:5px; border-radius:50%;
  background:rgba(255,255,255,0.35); border:none; cursor:pointer;
  transition:background 0.3s, transform 0.2s;
}
.hero-dot.on { background:#fff; transform:scale(1.4); }

.hero-btn {
  position:absolute; top:50%; transform:translateY(-50%); z-index:2;
  background:rgba(0,0,0,0.28); border:1px solid rgba(255,255,255,0.18);
  color:#fff; cursor:pointer; width:38px; height:38px;
  font-family:var(--font); font-size:15px;
  display:flex; align-items:center; justify-content:center; transition:background 0.2s;
}
.hero-btn:hover { background:rgba(0,0,0,0.55); }
.hero-btn.prev { left:18px; }
.hero-btn.next { right:18px; }

/* ══════════════════════════════
   MAIN CONTENT
══════════════════════════════ */
#main-page { padding-top: var(--hh); }

.sec { max-width:960px; margin:0 auto; padding:68px 32px; }

.sec-title {
  font-size:10px; letter-spacing:0.35em; text-transform:uppercase;
  color:#aaa; margin-bottom:38px; padding-bottom:12px; border-bottom:1px solid #ddd;
}

/* artwork tabs */
.art-tabs { display:flex; margin-bottom:32px; border-bottom:1px solid #ddd; }
.art-tab {
  background:none; border:none; font-family:var(--font);
  font-size:10px; letter-spacing:0.15em; text-transform:uppercase;
  color:#aaa; cursor:pointer;
  padding:10px 18px 10px 0; margin-right:18px;
  border-bottom:1px solid transparent; margin-bottom:-1px; transition:color 0.2s;
}
.art-tab.on { color:var(--ink); border-bottom-color:var(--ink); }
.art-tab:hover { color:var(--ink); }

.panel { display:none; }
.panel.on { display:block; }

/* 4-square grid */
.artwork-grid {
  display:grid; grid-template-columns:repeat(4,1fr); gap:6px;
}
.artwork-thumb {
  position:relative; aspect-ratio:1; background:#e0dcd6;
  overflow:hidden; cursor:pointer;
}
.artwork-thumb img { width:100%; height:100%; object-fit:cover; display:block; transition:transform 0.4s; }
.artwork-thumb:hover img { transform:scale(1.04); }

.aw-ph {
  width:100%; height:100%;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:7px;
  background:#e8e4de; transition:background 0.3s;
}
.artwork-thumb:hover .aw-ph { background:#dedad4; }
.aw-ph-cross { width:22px; height:22px; position:relative; }
.aw-ph-cross::before,.aw-ph-cross::after { content:''; position:absolute; background:#c8c4be; }
.aw-ph-cross::before { width:1px; height:100%; left:50%; top:0; }
.aw-ph-cross::after  { width:100%; height:1px; top:50%; left:0; }
.aw-ph-lbl { font-size:8px; letter-spacing:0.2em; text-transform:uppercase; color:#bbb; }

.aw-overlay {
  position:absolute; inset:0;
  background:rgba(0,0,0,0.52);
  display:flex; flex-direction:column; justify-content:flex-end; padding:12px;
  opacity:0; transition:opacity 0.3s;
}
.artwork-thumb:hover .aw-overlay { opacity:1; }
.aw-ov-title { font-size:13px; font-style:italic; color:#fff; margin-bottom:2px; line-height:1.3; }
.aw-ov-meta  { font-size:8px; letter-spacing:0.15em; text-transform:uppercase; color:rgba(255,255,255,0.5); }

/* projects */
.project-item {
  display:grid; grid-template-columns:1fr auto; gap:16px; align-items:start;
  padding:20px 0; border-bottom:1px solid #e8e4de;
}
.project-item:first-child { border-top:1px solid #e8e4de; }
.project-name { font-size:15px; font-weight:bold; margin-bottom:4px; }
.project-desc { font-size:13px; font-style:italic; color:var(--mid); }
.p-tag { font-size:9px; letter-spacing:0.12em; text-transform:uppercase; padding:3px 9px; border:1px solid; white-space:nowrap; margin-top:2px; }
.tag-on { color:#c0392b; border-color:#c0392b; }
.tag-pl { color:var(--faint); border-color:var(--faint); }

/* writings list */
#writings-sec { background:var(--bg2); }
.writings-cols { display:grid; grid-template-columns:1fr 1fr; gap:52px; }
.col-title { font-size:10px; letter-spacing:0.3em; text-transform:uppercase; color:#aaa; margin-bottom:20px; padding-bottom:10px; border-bottom:1px solid #ddd; }

.writing-item {
  display:block; padding:13px 0; border-bottom:1px solid #e8e4de;
  cursor:pointer; transition:padding-left 0.2s; text-decoration:none;
}
.writing-item:hover { padding-left:7px; }
.wi-title { font-size:14px; font-style:italic; color:var(--ink); margin-bottom:2px; transition:color 0.2s; }
.writing-item:hover .wi-title { color:#c0392b; }
.wi-meta { font-size:9px; letter-spacing:0.14em; text-transform:uppercase; color:#bbb; }

/* about */
.about-text { max-width:580px; font-size:15px; line-height:1.9; color:#555; }
.about-text p+p { margin-top:16px; }

/* contact */
#contact-sec { background:var(--bg2); }
.contact-email {
  display:inline-block; margin-top:6px;
  font-size:clamp(15px,2.4vw,26px); font-weight:bold;
  color:var(--ink); text-decoration:none;
  border-bottom:2px solid var(--ink); padding-bottom:2px;
  transition:color 0.2s, border-color 0.2s;
}
.contact-email:hover { color:#c0392b; border-color:#c0392b; }
.contact-note { margin-top:14px; font-style:italic; font-size:13px; color:#aaa; }

footer {
  border-top:1px solid #ddd; padding:20px 32px;
  display:flex; justify-content:space-between;
  font-size:10px; letter-spacing:0.1em; color:#bbb;
}

/* ══════════════════════════════
   DETAIL PAGE
══════════════════════════════ */
#detail-page {
  position: fixed;
  inset: 0;
  z-index: 300;
  background: var(--bg);
  overflow-y: auto;
  transform: translateY(100%);
  transition: transform 0.42s cubic-bezier(0.4, 0, 0.2, 1);
  pointer-events: none;
  visibility: hidden;
}
#detail-page.open {
  transform: translateY(0);
  pointer-events: all;
  visibility: visible;
}

.back-fab {
  position: fixed;
  bottom: 28px;
  left: 28px;
  z-index: 500;
  background: var(--ink);
  color: #fff;
  border: none;
  cursor: pointer;
  font-family: var(--font);
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  padding: 12px 20px;
  display: flex; align-items: center; gap: 10px;
  transition: background 0.2s, opacity 0.3s, transform 0.3s;
  opacity: 0;
  transform: translateY(10px);
  pointer-events: none;
}
.back-fab svg { width:13px; height:13px; flex-shrink:0; }
.back-fab.visible {
  opacity: 1;
  transform: translateY(0);
  pointer-events: all;
}
.back-fab:hover { background: #333; }

.detail-top-bar {
  position: sticky; top:0;
  background: var(--bg);
  border-bottom: 1px solid #ddd;
  height: var(--hh);
  display: flex; align-items: center;
  padding: 0 24px;
  gap: 16px;
  z-index: 10;
}
.detail-top-title {
  font-size: 13px; font-style: italic; color: var(--mid);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.detail-type-badge {
  font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase;
  color: #aaa; border: 1px solid #ddd; padding: 2px 8px; white-space: nowrap;
}

.detail-body {
  max-width: 860px; margin: 0 auto;
  padding: 52px 32px 120px;
}

.detail-hero-ph {
  width: 100%; height: 52vh;
  background: #e0dcd6;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 36px;
}
.detail-hero-ph span { font-size:10px; letter-spacing:0.25em; text-transform:uppercase; color:#bbb; }
.detail-hero-img {
  width: 100%; max-height: 70vh; object-fit: contain;
  background: #111; display: block; margin-bottom: 36px;
}

.detail-title { font-size:clamp(20px,3.5vw,36px); font-weight:bold; letter-spacing:-0.01em; margin-bottom:5px; }
.detail-meta  { font-size:11px; letter-spacing:0.18em; text-transform:uppercase; color:#aaa; margin-bottom:40px; }

.detail-sec-label {
  font-size:10px; letter-spacing:0.3em; text-transform:uppercase;
  color:#aaa; margin-bottom:14px; margin-top:44px;
  padding-bottom:10px; border-bottom:1px solid #ddd;
}

.detail-description { font-size:15px; line-height:1.9; color:#555; max-width:640px; }
.detail-description p+p { margin-top:14px; }

.detail-writing-body {
  font-size: 16px; line-height: 2.0; color: #333;
  max-width: 640px; white-space: pre-line;
}

.detail-photos { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; margin-top:6px; }
.detail-photo { aspect-ratio:1; background:#e8e4de; overflow:hidden; cursor:pointer; }
.detail-photo img { width:100%; height:100%; object-fit:cover; display:block; transition:transform 0.3s; }
.detail-photo:hover img { transform:scale(1.05); }
.detail-photo-ph { width:100%; height:100%; display:flex; align-items:center; justify-content:center; }
.detail-photo-ph span { font-size:9px; letter-spacing:0.2em; text-transform:uppercase; color:#bbb; }

.detail-writing-item {
  padding:13px 0; border-bottom:1px solid #e8e4de;
  font-size:14px; font-style:italic; color:#555;
}

/* responsive */
@media(max-width:700px){
  .artwork-grid { grid-template-columns:repeat(2,1fr); }
  .writings-cols { grid-template-columns:1fr; gap:32px; }
  .detail-photos { grid-template-columns:repeat(2,1fr); }
  nav { gap:14px; }
  .sec { padding:52px 18px; }
  .back-fab { bottom:18px; left:18px; }
}
</style>
</head>
<body>

<!-- HEADER (built by JS from SITE settings) -->
<header>
  <div class="header-left">
    <a href="#" class="header-name" id="headerName" onclick="showMain();return false;"></a>
    <a id="igLink" href="#" target="_blank" rel="noopener" class="ig-btn" title="Instagram">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
        <circle cx="12" cy="12" r="4"/>
        <circle cx="17.5" cy="6.5" r="0.8" fill="currentColor" stroke="none"/>
      </svg>
    </a>
  </div>

  <nav>
    <a href="#artworks-sec" id="nav-artworks">Artworks</a>
    <a href="#writings-sec" id="nav-writings">Writings</a>
    <a href="#about-sec"    id="nav-about">About</a>
    <a href="#contact-sec"  id="nav-contact">Contact</a>
  </nav>

  <div class="header-right">
    <button class="lb on" onclick="setLang('en')" id="b-en">EN</button>
    <span class="ls">·</span>
    <button class="lb"    onclick="setLang('tr')" id="b-tr">TR</button>
  </div>
</header>

<!-- MAIN PAGE -->
<div id="main-page">

  <!-- HERO (slides built by JS) -->
  <section id="hero">
    <div class="hero-slides" id="heroSlides"></div>
    <div class="hero-overlay"></div>
    <div class="hero-name-wrap"><div class="hero-name" id="heroName"></div></div>
    <button class="hero-btn prev" onclick="heroMove(-1)">&#8592;</button>
    <button class="hero-btn next" onclick="heroMove(1)">&#8594;</button>
    <div class="hero-dots" id="heroDots"></div>
  </section>

  <!-- ARTWORKS (grid built by JS) -->
  <section id="artworks-sec">
    <div class="sec">
      <div class="sec-title" id="sec-artworks-title">Artworks</div>
      <div class="art-tabs">
        <button class="art-tab on" onclick="swTab('g')" id="tab-works">Works</button>
        <button class="art-tab"    onclick="swTab('p')" id="tab-projects">Ongoing &amp; Planned</button>
      </div>
      <div class="panel on" id="pg">
        <div class="artwork-grid" id="artworkGrid"></div>
      </div>
      <div class="panel" id="pp">
        <div id="projectsList"></div>
      </div>
    </div>
  </section>

  <!-- WRITINGS (lists built by JS) -->
  <section id="writings-sec">
    <div class="sec">
      <div class="sec-title" id="sec-writings-title">Writings</div>
      <div class="writings-cols">
        <div>
          <div class="col-title" id="col-poems-title">Poems</div>
          <div id="poemsList"></div>
        </div>
        <div>
          <div class="col-title" id="col-articles-title">Articles</div>
          <div id="articlesList"></div>
        </div>
      </div>
    </div>
  </section>

  <!-- ABOUT (filled by JS) -->
  <section id="about-sec">
    <div class="sec">
      <div class="sec-title" id="sec-about-title">About</div>
      <div class="about-text" id="aboutText"></div>
    </div>
  </section>

  <!-- CONTACT (filled by JS) -->
  <section id="contact-sec">
    <div class="sec" style="text-align:center;">
      <div class="sec-title" id="sec-contact-title">Contact</div>
      <a id="contactEmail" href="#" class="contact-email"></a>
      <p class="contact-note" id="contactNote"></p>
    </div>
  </section>

  <footer>
    <span id="footerName"></span>
    <span id="footerDomain"></span>
  </footer>
</div>

<!-- DETAIL PAGE (slide-up) -->
<div id="detail-page">
  <div class="detail-top-bar">
    <span class="detail-type-badge" id="detailBadge">artwork</span>
    <span class="detail-top-title"  id="detailTopTitle"></span>
  </div>
  <div class="detail-body" id="detailBody"></div>
</div>

<button class="back-fab" id="backFab" onclick="closeDetail()">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="15 18 9 12 15 6"/>
  </svg>
  <span id="backLabel">Back</span>
</button>

<!-- Load content first, then the site engine -->
<script src="content.js"></script>
<script>
/* ════════════════════════════════════════════════════════
   SITE ENGINE — do not edit this file
   Edit content.js instead
════════════════════════════════════════════════════════ */

let currentLang = 'en';
let savedScrollY = 0;

/* ── helpers ── */
const t = (obj, l) => (l === 'tr' && obj.tr) ? obj.tr : obj.en;
const $ = id => document.getElementById(id);

/* ── language ── */
const LABELS = {
  artworks:  { en: 'Artworks',          tr: 'Eserler'          },
  writings:  { en: 'Writings',          tr: 'Yazılar'          },
  about:     { en: 'About',             tr: 'Hakkında'         },
  contact:   { en: 'Contact',           tr: 'İletişim'         },
  works:     { en: 'Works',             tr: 'Eserler'          },
  ongoing_pl:{ en: 'Ongoing & Planned', tr: 'Devam & Planlanan'},
  poems:     { en: 'Poems',             tr: 'Şiirler'          },
  articles:  { en: 'Articles',          tr: 'Makaleler'        },
  back:      { en: 'Back',              tr: 'Geri'             },
  ongoing:   { en: 'Ongoing',           tr: 'Devam'            },
  planned:   { en: 'Planned',           tr: 'Planlandı'        },
  artwork:   { en: 'Artwork',           tr: 'Eser'             },
  poem:      { en: 'Poem',              tr: 'Şiir'             },
  article:   { en: 'Article',           tr: 'Makale'           },
  about_work:{ en: 'About this work',   tr: 'Bu eser hakkında' },
  add_photo: { en: 'add main artwork image', tr: 'ana eser görseli ekle' },
  add_photos:{ en: 'Additional photos', tr: 'Ek fotoğraflar'   },
  rel_wrt:   { en: 'Related writings',  tr: 'İlgili yazılar'   },
  photo:     { en: 'photo',             tr: 'fotoğraf'         },
};

function setLang(l) {
  currentLang = l;
  document.documentElement.lang = l;
  $('b-en').classList.toggle('on', l === 'en');
  $('b-tr').classList.toggle('on', l === 'tr');
  renderAll();
}

/* ── render all dynamic content ── */
function renderAll() {
  const l = currentLang;

  /* site identity */
  $('headerName').textContent = SITE.name;
  $('heroName').textContent   = SITE.name;
  $('footerName').textContent = SITE.name;
  $('footerDomain').textContent = SITE.domain;
  $('igLink').href = SITE.instagram;

  /* nav labels */
  $('nav-artworks').textContent = LABELS.artworks[l];
  $('nav-writings').textContent = LABELS.writings[l];
  $('nav-about').textContent    = LABELS.about[l];
  $('nav-contact').textContent  = LABELS.contact[l];

  /* section titles */
  $('sec-artworks-title').textContent = LABELS.artworks[l];
  $('tab-works').textContent          = LABELS.works[l];
  $('tab-projects').textContent       = LABELS.ongoing_pl[l];
  $('sec-writings-title').textContent = LABELS.writings[l];
  $('col-poems-title').textContent    = LABELS.poems[l];
  $('col-articles-title').textContent = LABELS.articles[l];
  $('sec-about-title').textContent    = LABELS.about[l];
  $('sec-contact-title').textContent  = LABELS.contact[l];
  $('backLabel').textContent          = LABELS.back[l];

  /* about */
  const aboutParagraphs = t(SITE.about, l)
    .split(/\n\n+/)
    .map(p => `<p>${p.replace(/\n/g,'<br>')}</p>`)
    .join('');
  $('aboutText').innerHTML = aboutParagraphs;

  /* contact */
  $('contactEmail').textContent = SITE.email;
  $('contactEmail').href = `mailto:${SITE.email}`;
  $('contactNote').textContent = t(SITE.contact, l);

  /* hero */
  renderHero();

  /* grids */
  renderArtworkGrid();
  renderProjects();
  renderPoems();
  renderArticles();
}

/* ── hero ── */
let hCur = 0, hTotal = 0, hTimer;

function renderHero() {
  const slides = $('heroSlides');
  slides.innerHTML = '';

  const imgs = (HERO_IMAGES && HERO_IMAGES.length)
    ? HERO_IMAGES
    : ['', '', '', ''];  /* placeholders */

  imgs.forEach(src => {
    const div = document.createElement('div');
    div.className = 'hero-slide';
    if (src) {
      div.innerHTML = `<img src="${src}" alt="">`;
    } else {
      div.innerHTML = `<div class="hero-slide-ph"><span>add artwork photo</span></div>`;
    }
    slides.appendChild(div);
  });

  hTotal = imgs.length;
  heroInitDots();
  clearInterval(hTimer);
  hTimer = setInterval(() => heroMove(1), 4500);
}

function heroInitDots() {
  const el = $('heroDots');
  el.innerHTML = '';
  for (let i = 0; i < hTotal; i++) {
    const d = document.createElement('button');
    d.className = 'hero-dot' + (i === 0 ? ' on' : '');
    d.onclick = () => heroGoTo(i);
    el.appendChild(d);
  }
  heroGoTo(0);
}

function heroGoTo(n) {
  hCur = (n + hTotal) % hTotal;
  $('heroSlides').style.transform = `translateX(-${hCur * 100}%)`;
  $('heroDots').querySelectorAll('.hero-dot').forEach((d, i) =>
    d.classList.toggle('on', i === hCur));
}

function heroMove(dir) {
  clearInterval(hTimer);
  heroGoTo(hCur + dir);
  hTimer = setInterval(() => heroMove(1), 4500);
}

let hDx = 0;
$('heroSlides').addEventListener('mousedown',  e => hDx = e.clientX);
$('heroSlides').addEventListener('touchstart', e => hDx = e.touches[0].clientX, { passive: true });
$('heroSlides').addEventListener('mouseup',    e => { if (Math.abs(e.clientX - hDx) > 40) heroMove(e.clientX < hDx ? 1 : -1); });
$('heroSlides').addEventListener('touchend',   e => { const d = e.changedTouches[0].clientX - hDx; if (Math.abs(d) > 40) heroMove(d < 0 ? 1 : -1); });

/* ── artwork grid ── */
function renderArtworkGrid() {
  const l = currentLang;
  const grid = $('artworkGrid');
  grid.innerHTML = '';
  ARTWORKS.forEach((aw, idx) => {
    const div = document.createElement('div');
    div.className = 'artwork-thumb';
    div.onclick = () => openDetail('artwork', idx);

    const imgPart = aw.mainImage
      ? `<img src="${aw.mainImage}" alt="${t(aw.title, l)}">`
      : `<div class="aw-ph"><div class="aw-ph-cross"></div><span class="aw-ph-lbl">image</span></div>`;

    div.innerHTML = `
      ${imgPart}
      <div class="aw-overlay">
        <div class="aw-ov-title">${t(aw.title, l)}</div>
        <div class="aw-ov-meta">${aw.year}</div>
      </div>`;
    grid.appendChild(div);
  });
}

/* ── projects ── */
function renderProjects() {
  const l = currentLang;
  const list = $('projectsList');
  list.innerHTML = '';
  PROJECTS.forEach(pr => {
    const div = document.createElement('div');
    div.className = 'project-item';
    const isOn = pr.status === 'ongoing';
    div.innerHTML = `
      <div>
        <div class="project-name">${t(pr.title, l)}</div>
        <div class="project-desc">${t(pr.desc, l)}</div>
      </div>
      <span class="p-tag ${isOn ? 'tag-on' : 'tag-pl'}">
        ${isOn ? LABELS.ongoing[l] : LABELS.planned[l]}
      </span>`;
    list.appendChild(div);
  });
}

/* ── poems list ── */
function renderPoems() {
  const l = currentLang;
  const list = $('poemsList');
  list.innerHTML = '';
  POEMS.forEach((pm, idx) => {
    const a = document.createElement('a');
    a.href = '#';
    a.className = 'writing-item';
    a.onclick = e => { e.preventDefault(); openDetail('poem', idx); };
    a.innerHTML = `
      <div class="wi-title">${t(pm.title, l)}</div>
      <div class="wi-meta">${pm.year}</div>`;
    list.appendChild(a);
  });
}

/* ── articles list ── */
function renderArticles() {
  const l = currentLang;
  const list = $('articlesList');
  list.innerHTML = '';
  ARTICLES.forEach((ar, idx) => {
    const a = document.createElement('a');
    a.href = '#';
    a.className = 'writing-item';
    a.onclick = e => { e.preventDefault(); openDetail('article', idx); };
    a.innerHTML = `
      <div class="wi-title">${t(ar.title, l)}</div>
      <div class="wi-meta">${ar.year} · ${t(ar.type, l)}</div>`;
    list.appendChild(a);

/* ── tabs ── */
function swTab(tab) {
  $('tab-works').classList.toggle('on', tab === 'g');
  $('tab-projects').classList.toggle('on', tab === 'p');
  $('pg').classList.toggle('on', tab === 'g');
  $('pp').classList.toggle('on', tab === 'p');
}

/* ── detail page ── */
const detailPage  = $('detail-page');
const detailBody  = $('detailBody');
const detailBadge = $('detailBadge');
const detailTopTi = $('detailTopTitle');
const backFab     = $('backFab');

function buildArtworkHTML(aw) {
  const l = currentLang;
  const title  = t(aw.title, l);
  const medium = t(aw.medium, l);
  const desc   = t(aw.desc, l);

  const heroImg = aw.mainImage
    ? `<img class="detail-hero-img" src="${aw.mainImage}" alt="${title}">`
    : `<div class="detail-hero-ph"><span>${LABELS.add_photo[l]}</span></div>`;

  const extraPhotos = (() => {
    const extras = aw.images || [];
    const slots = Math.max(extras.length, 3);
    return Array.from({ length: slots }, (_, i) =>
      extras[i]
        ? `<div class="detail-photo"><img src="${extras[i]}" alt="${title} ${i+1}"></div>`
        : `<div class="detail-photo"><div class="detail-photo-ph"><span>${LABELS.photo[l]}</span></div></div>`
    ).join('');
  })();

  return `
    ${heroImg}
    <div class="detail-title">${title}</div>
    <div class="detail-meta">${aw.year} · ${medium}</div>
    <div class="detail-sec-label">${LABELS.about_work[l]}</div>
    <div class="detail-description">${desc.split(/\n\n+/).map(p => `<p>${p}</p>`).join('')}</div>
    <div class="detail-sec-label">${LABELS.add_photos[l]}</div>
    <div class="detail-photos">${extraPhotos}</div>
    <div class="detail-sec-label">${LABELS.rel_wrt[l]}</div>
    <div class="detail-writing-item" style="color:#bbb;font-style:italic;font-size:13px;">—</div>
  `;
}

function buildPoemHTML(pm) {
  const l = currentLang;
  return `
    <div class="detail-title">${t(pm.title, l)}</div>
    <div class="detail-meta">${pm.year}</div>
    <div class="detail-sec-label">${LABELS.poem[l]}</div>
    <div class="detail-writing-body">${t(pm.body, l)}</div>
  `;
}

function buildArticleHTML(ar) {
  const l = currentLang;
  return `
    <div class="detail-title">${t(ar.title, l)}</div>
    <div class="detail-meta">${ar.year} · ${t(ar.type, l)}</div>
    <div class="detail-sec-label">${LABELS.article[l]}</div>
    <div class="detail-writing-body">${t(ar.body, l)}</div>
  `;
}

function openDetail(type, idx) {
  savedScrollY = window.scrollY;
  let html = '', badge = '', topTitle = '';

  if (type === 'artwork') {
    const aw = ARTWORKS[idx];
    html = buildArtworkHTML(aw);
    badge = LABELS.artwork[currentLang];
    topTitle = t(aw.title, currentLang);
  } else if (type === 'poem') {
    const pm = POEMS[idx];
    html = buildPoemHTML(pm);
    badge = LABELS.poem[currentLang];
    topTitle = t(pm.title, currentLang);
  } else if (type === 'article') {
    const ar = ARTICLES[idx];
    html = buildArticleHTML(ar);
    badge = LABELS.article[currentLang];
    topTitle = t(ar.title, currentLang);
  }

  detailBody.innerHTML = html;
  detailBadge.textContent = badge;
  detailTopTi.textContent = topTitle;
  document.body.style.overflow = 'hidden';
  detailPage.scrollTop = 0;
  detailPage.classList.add('open');
  setTimeout(() => backFab.classList.add('visible'), 200);
}

function closeDetail() {
  detailPage.classList.remove('open');
  backFab.classList.remove('visible');
  document.body.style.overflow = '';
  window.scrollTo(0, savedScrollY);
}

function showMain() {
  closeDetail();
}

/* ── boot ── */
renderAll();
</script>

</html>
