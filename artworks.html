<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Artworks — tarık yiğit</title>
<link rel="stylesheet" href="style.css"/>
<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
<style>
.artwork-grid {
  display: grid; grid-template-columns: repeat(4,1fr); gap: 6px;
}
.artwork-thumb {
  position: relative; aspect-ratio: 1;
  background: #e8e4de; overflow: hidden; cursor: pointer;
}
.artwork-thumb img { width:100%; height:100%; object-fit:cover; display:block; transition:transform .4s; }
.artwork-thumb:hover img { transform:scale(1.04); }
 
.aw-ph {
  width:100%; height:100%;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:7px;
  transition:background .3s;
}
.artwork-thumb:hover .aw-ph { background:#dedad4; }
.aw-ph-cross { width:20px; height:20px; position:relative; }
.aw-ph-cross::before, .aw-ph-cross::after { content:''; position:absolute; background:#c8c4be; }
.aw-ph-cross::before { width:1px; height:100%; left:50%; top:0; }
.aw-ph-cross::after  { width:100%; height:1px; top:50%; left:0; }
.aw-ph-lbl { font-size:8px; letter-spacing:.2em; text-transform:uppercase; color:#bbb; font-family:var(--mono); }
 
.aw-overlay {
  position:absolute; inset:0;
  background:rgba(0,0,0,.52);
  display:flex; flex-direction:column; justify-content:flex-end; padding:12px;
  opacity:0; transition:opacity .3s;
}
.artwork-thumb:hover .aw-overlay { opacity:1; }
.aw-ov-title { font-size:13px; font-style:italic; color:#fff; margin-bottom:2px; line-height:1.3; }
.aw-ov-meta  { font-size:9px; letter-spacing:.14em; text-transform:uppercase; color:rgba(255,255,255,.5); font-family:var(--mono); }
 
.project-item {
  display:grid; grid-template-columns:1fr auto; gap:16px; align-items:start;
  padding:20px 0; border-bottom:1px solid #e8e4de;
}
.project-item:first-child { border-top:1px solid #e8e4de; }
.project-name { font-size:15px; font-weight:500; margin-bottom:4px; }
.project-desc { font-size:13px; font-style:italic; color:var(--mid); }
.p-tag { font-size:9px; letter-spacing:.12em; text-transform:uppercase; padding:3px 9px; border:1px solid; white-space:nowrap; font-family:var(--mono); }
.tag-on { color:var(--red); border-color:var(--red); }
.tag-pl { color:#ccc; border-color:#ccc; }
 
@media(max-width:640px) { .artwork-grid { grid-template-columns:repeat(2,1fr); } }
</style>
</head>
<body>
<div id="page-transition-mask"></div>
 
<header>
  <div class="header-left">
    <a href="index.html" class="header-name">tarık yiğit</a>
    <a href="https://instagram.com/veretrir" target="_blank" rel="noopener" class="ig-btn" title="Instagram" data-no-transition>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><circle cx="12" cy="12" r="4"/>
        <circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/>
      </svg>
    </a>
  </div>
  <nav>
    <a href="artworks.html" class="active" data-en="Artworks" data-tr="Eserler">Artworks</a>
    <a href="writings.html" data-en="Writings"  data-tr="Yazılar">Writings</a>
    <a href="about.html"    data-en="About"     data-tr="Hakkında">About</a>
    <a href="contact.html"  data-en="Contact"   data-tr="İletişim">Contact</a>
  </nav>
  <div class="header-right">
    <button class="lb on" id="b-en" onclick="setLang('en')">EN</button>
    <span class="lang-sep">·</span>
    <button class="lb" id="b-tr" onclick="setLang('tr')">TR</button>
  </div>
</header>
 
<div class="page-wrap">
  <div class="sec">
    <div class="sec-title" data-en="Artworks" data-tr="Eserler">Artworks</div>
    <div class="tabs">
      <button class="tab-btn on" id="tab-works"    onclick="swTab('works')"    data-en="Works"                data-tr="Eserler">Works</button>
      <button class="tab-btn"    id="tab-projects" onclick="swTab('projects')" data-en="Ongoing &amp; Planned" data-tr="Devam &amp; Planlanan">Ongoing &amp; Planned</button>
    </div>
    <div class="tab-panel on" id="panel-works">
      <div class="artwork-grid" id="artworkGrid"></div>
    </div>
    <div class="tab-panel" id="panel-projects">
      <div id="projectsList"></div>
    </div>
  </div>
</div>
 
<footer><span>tarık yiğit</span><span>veretrir.art</span></footer>
 
<!-- READING OVERLAY -->
<div id="reading-overlay">
  <div class="reading-topbar">
    <span class="reading-badge" id="reading-badge"></span>
    <span class="reading-top-title" id="reading-top-title"></span>
  </div>
  <div class="reading-body" id="reading-body"></div>
</div>
<button id="back-fab" onclick="closeReading()">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  <span data-en="Back" data-tr="Geri">Back</span>
</button>
 
<!-- 3D VIEWER -->
<div id="viewer-overlay">
  <div class="viewer-topbar">
    <span class="viewer-title" id="viewer-title-el"></span>
    <button class="viewer-close" onclick="closeViewer()" data-en="Close" data-tr="Kapat">Close</button>
  </div>
  <model-viewer id="model-viewer-el" camera-controls auto-rotate shadow-intensity="1" exposure="0.75"
    style="background:#000;width:100%;height:100%;flex:1;"></model-viewer>
</div>
 
<script src="data.js"></script>
<script src="common.js"></script>
<script>
function swTab(t) {
  ['works','projects'].forEach(id => {
    document.getElementById('tab-' + id).classList.toggle('on', id === t);
    document.getElementById('panel-' + id).classList.toggle('on', id === t);
  });
}
 
(function buildPage() {
  const l    = currentLang;
  const grid = document.getElementById('artworkGrid');
  SITE.artworks.forEach((aw, idx) => {
    const div = document.createElement('div');
    div.className = 'artwork-thumb';
    div.addEventListener('click', () => openArtwork(idx));
    div.innerHTML = aw.image
      ? `<img src="${aw.image}" alt="${aw.title}">
         <div class="aw-overlay"><div class="aw-ov-title">${aw.title}</div><div class="aw-ov-meta">${aw.year}</div></div>`
      : `<div class="aw-ph"><div class="aw-ph-cross"></div><span class="aw-ph-lbl">image</span></div>
         <div class="aw-overlay"><div class="aw-ov-title">${aw.title}</div><div class="aw-ov-meta">${aw.year}</div></div>`;
    grid.appendChild(div);
  });
 
  const projEl = document.getElementById('projectsList');
  SITE.projects.forEach(p => {
    const statusLabel = p.status === 'ongoing'
      ? (l === 'tr' ? 'Devam Ediyor' : 'Ongoing')
      : (l === 'tr' ? 'Planlandı'    : 'Planned');
    projEl.innerHTML += `<div class="project-item">
      <div>
        <div class="project-name">${l === 'tr' ? p.titleTR : p.title}</div>
        <div class="project-desc">${l === 'tr' ? p.descTR  : p.desc}</div>
      </div>
      <span class="p-tag ${p.status === 'ongoing' ? 'tag-on' : 'tag-pl'}">${statusLabel}</span>
    </div>`;
  });
})();
</script>
</body>
</html>
