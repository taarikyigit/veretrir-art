<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Writings — tarik yigit</title>
<link rel="stylesheet" href="style.css"/>
<style>
.writings-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 52px;
}
@media(max-width:640px){ .writings-grid{grid-template-columns:1fr;gap:32px;} }
</style>
</head>
<body>
 
<!-- HEADER -->
<header>
  <div class="header-left">
    <a href="index.html" class="header-name">tarik yigit</a>
    <a href="https://instagram.com/veretrir" target="_blank" rel="noopener" class="ig-btn" title="Instagram">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
        <circle cx="12" cy="12" r="4"/>
        <circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/>
      </svg>
    </a>
  </div>
  <nav>
    <a href="artworks.html">Artworks</a>
    <a href="writings.html" class="active">Writings</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
  </nav>
  <div class="header-right">
    <button class="lb on" id="b-en" onclick="setLang('en')">EN</button>
    <span class="lang-sep">·</span>
    <button class="lb" id="b-tr" onclick="setLang('tr')">TR</button>
  </div>
</header>
 
<div class="page-wrap">
  <div class="sec">
    <div class="sec-title" data-en="Writings" data-tr="Yazılar">Writings</div>
 
    <!-- TABS -->
    <div class="tabs">
      <button class="tab-btn on" id="tab-all"      onclick="swTab('all')"      data-en="All"      data-tr="Tümü">All</button>
      <button class="tab-btn"    id="tab-poems"    onclick="swTab('poems')"    data-en="Poems"    data-tr="Şiirler">Poems</button>
      <button class="tab-btn"    id="tab-articles" onclick="swTab('articles')" data-en="Articles" data-tr="Makaleler">Articles</button>
    </div>
 
    <!-- ALL TAB -->
    <div class="tab-panel on" id="panel-all">
      <div class="writings-grid">
        <div>
          <div class="col-title" data-en="Poems" data-tr="Şiirler">Poems</div>
          <div id="all-poems-list"></div>
        </div>
        <div>
          <div class="col-title" data-en="Articles" data-tr="Makaleler">Articles</div>
          <div id="all-articles-list"></div>
        </div>
      </div>
    </div>
 
    <!-- POEMS TAB -->
    <div class="tab-panel" id="panel-poems">
      <div id="poems-list"></div>
    </div>
 
    <!-- ARTICLES TAB -->
    <div class="tab-panel" id="panel-articles">
      <div id="articles-list"></div>
    </div>
 
  </div>
</div>
 
<footer><span>tarik yigit</span><span>veretrir.art</span></footer>
 
<!-- READING OVERLAY -->
<div id="reading-overlay">
  <div class="reading-topbar">
    <span class="reading-badge" id="reading-badge"></span>
    <span class="reading-top-title" id="reading-top-title"></span>
  </div>
  <div class="reading-body" id="reading-body"></div>
</div>
 
<!-- FLOATING BACK BUTTON -->
<button id="back-fab" onclick="closeReading()">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  <span data-en="Back" data-tr="Geri">Back</span>
</button>
 
<script src="data.js"></script>
<script src="common.js"></script>
<script>
/* ── Render lists ── */
function makeWritingItem(label, idx, title, meta) {
  const el = document.createElement('a');
  el.href = '#';
  el.className = 'writing-item';
  el.innerHTML = `<div class="wi-title">${title}</div><div class="wi-meta">${meta}</div>`;
  el.addEventListener('click', e => {
    e.preventDefault();
    if (label === 'poem')    openPoem(idx);
    if (label === 'article') openArticle(idx);
  });
  return el;
}
 
function buildLists() {
  const l = currentLang;
 
  /* all-poems-list */
  ['all-poems-list','poems-list'].forEach(id => {
    const el = document.getElementById(id);
    el.innerHTML = '';
    SITE.poems.forEach((p, i) => {
      el.appendChild(makeWritingItem('poem', i,
        l==='tr' ? p.titleTR : p.title,
        p.year
      ));
    });
  });
 
  /* all-articles-list */
  ['all-articles-list','articles-list'].forEach(id => {
    const el = document.getElementById(id);
    el.innerHTML = '';
    SITE.articles.forEach((a, i) => {
      const type = l==='tr' ? a.typeTR : a.type;
      el.appendChild(makeWritingItem('article', i,
        l==='tr' ? a.titleTR : a.title,
        `${a.year} · ${type}`
      ));
    });
  });
}
 
/* ── Tab switcher ── */
function swTab(t) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('on'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('on'));
  document.getElementById('tab-' + t).classList.add('on');
  document.getElementById('panel-' + t).classList.add('on');
}
 
/* ── Init ── */
document.addEventListener('DOMContentLoaded', buildLists);
 
/* Rebuild lists when lang changes */
const _origSetLang = setLang;
// Override setLang to also rebuild lists
window.setLang = function(l) {
  _origSetLang(l);
  buildLists();
};
</script>
</body>
</html>
