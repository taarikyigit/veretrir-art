<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Writings — tarık yiğit</title>
<link rel="stylesheet" href="style.css"/>
<style>
.writings-grid { display:grid; grid-template-columns:1fr 1fr; gap:52px; }
@media(max-width:640px) { .writings-grid { grid-template-columns:1fr; gap:32px; } }
</style>
</head>
<body>
<div id="page-transition-mask"></div>
 
<header>
  <div class="header-left">
    <a href="index.html" class="header-name">tarık yiğit</a>
    <a href="https://instagram.com/veretrir" target="_blank" rel="noopener" class="ig-btn" title="Instagram" data-no-transition>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><circle cx="12" cy="12" r="4"/>
        <circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/>
      </svg>
    </a>
  </div>
  <nav>
    <a href="artworks.html" data-en="Artworks" data-tr="Eserler">Artworks</a>
    <a href="writings.html" class="active" data-en="Writings" data-tr="Yazılar">Writings</a>
    <a href="about.html"    data-en="About"    data-tr="Hakkında">About</a>
    <a href="contact.html"  data-en="Contact"  data-tr="İletişim">Contact</a>
  </nav>
  <div class="header-right">
    <button class="lb on" id="b-en" onclick="setLang('en')">EN</button>
    <span class="lang-sep">·</span>
    <button class="lb" id="b-tr" onclick="setLang('tr')">TR</button>
  </div>
</header>
 
<div class="page-wrap">
  <div class="sec">
    <!-- sec-title switches with lang -->
    <div class="sec-title" data-en="Writings" data-tr="Yazılar">Writings</div>
 
    <div class="tabs">
      <button class="tab-btn on" id="tab-all"      onclick="swTab('all')"      data-en="All"      data-tr="Tümü">All</button>
      <button class="tab-btn"    id="tab-poems"    onclick="swTab('poems')"    data-en="Poems"    data-tr="Şiirler">Poems</button>
      <button class="tab-btn"    id="tab-articles" onclick="swTab('articles')" data-en="Articles" data-tr="Makaleler">Articles</button>
    </div>
 
    <!-- ALL tab -->
    <div class="tab-panel on" id="panel-all">
      <div class="writings-grid">
        <div>
          <div class="col-title" id="col-poems-lbl" data-en="Poems" data-tr="Şiirler">Poems</div>
          <div id="all-poems"></div>
        </div>
        <div>
          <div class="col-title" id="col-articles-lbl" data-en="Articles" data-tr="Makaleler">Articles</div>
          <div id="all-articles"></div>
        </div>
      </div>
    </div>
 
    <!-- POEMS tab -->
    <div class="tab-panel" id="panel-poems">
      <div id="only-poems"></div>
    </div>
 
    <!-- ARTICLES tab -->
    <div class="tab-panel" id="panel-articles">
      <div id="only-articles"></div>
    </div>
  </div>
</div>
 
<footer><span>tarık yiğit</span><span>veretrir.art</span></footer>
 
<!-- READING OVERLAY -->
<div id="reading-overlay">
  <div class="reading-topbar">
    <span class="reading-badge" id="reading-badge"></span>
    <span class="reading-top-title" id="reading-top-title"></span>
  </div>
  <div class="reading-body" id="reading-body"></div>
</div>
<button id="back-fab" onclick="closeReading()">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  <span data-en="Back" data-tr="Geri">Back</span>
</button>
 
<script src="data.js"></script>
<script src="common.js"></script>
<script>
/* Build a clickable writing item element */
function makeItem(type, idx, title, meta) {
  const a = document.createElement('a');
  a.href = '#';
  a.className = 'writing-item';
  a.innerHTML = `<div class="wi-title">${title}</div><div class="wi-meta">${meta}</div>`;
  a.addEventListener('click', e => {
    e.preventDefault();
    if (type === 'poem')    openPoem(idx);
    if (type === 'article') openArticle(idx);
  });
  return a;
}
 
/* Render all lists using current language */
function buildLists() {
  const l = currentLang;
 
  const targets = {
    poems:    ['all-poems', 'only-poems'],
    articles: ['all-articles', 'only-articles'],
  };
 
  /* Poems */
  targets.poems.forEach(id => {
    const el = document.getElementById(id);
    el.innerHTML = '';
    SITE.poems.forEach((p, i) => {
      el.appendChild(makeItem('poem', i,
        l === 'tr' ? p.titleTR : p.title,
        p.year
      ));
    });
  });
 
  /* Articles */
  targets.articles.forEach(id => {
    const el = document.getElementById(id);
    el.innerHTML = '';
    SITE.articles.forEach((a, i) => {
      const type = l === 'tr' ? a.typeTR : a.type;
      el.appendChild(makeItem('article', i,
        l === 'tr' ? a.titleTR : a.title,
        `${a.year} · ${type}`
      ));
    });
  });
}
 
/* Tab switcher */
function swTab(t) {
  ['all','poems','articles'].forEach(id => {
    document.getElementById('tab-' + id).classList.toggle('on', id === t);
    document.getElementById('panel-' + id).classList.toggle('on', id === t);
  });
}
 
/* Hook into lang changes — done after DOM ready so setLang exists */
document.addEventListener('DOMContentLoaded', () => {
  buildLists(); // initial render
 
  /* Wrap the lang buttons so every switch also rebuilds lists */
  document.getElementById('b-en').addEventListener('click', () => buildLists());
  document.getElementById('b-tr').addEventListener('click', () => buildLists());
});
</script>
</body>
</html>
